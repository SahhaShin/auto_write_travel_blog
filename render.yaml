services:
  - type: web
    name: naver-blog-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: AES_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
