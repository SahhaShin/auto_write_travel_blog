# Server
server.port=${PORT:8080}
spring.application.name=naver-blog-backend

# MySQL DataSource (환경변수로 설정)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/naver_blog_auto?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# MyBatis
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.shincha.naverblog.model.dto
mybatis.configuration.map-underscore-to-camel-case=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# Claude API
claude.api.key=${CLAUDE_API_KEY:your-claude-api-key-here}
claude.api.model=claude-sonnet-4-6
claude.api.max-tokens=4096

# CORS 허용 origin (Vercel 도메인)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Cloudinary (이미지 클라우드 스토리지)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini API (Claude 크레딧 소진 시 fallback)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash

# Logging
logging.level.com.shincha.naverblog=INFO
logging.level.org.mybatis=WARN
