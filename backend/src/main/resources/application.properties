# Server
server.port=8080
spring.application.name=naver-blog-backend

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/naver_blog_auto?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.shincha.naverblog.model.dto
mybatis.configuration.map-underscore-to-camel-case=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads

# Claude API
claude.api.key=${CLAUDE_API_KEY:your-claude-api-key-here}
claude.api.model=claude-sonnet-4-6
claude.api.max-tokens=4096

# Jasypt (AES 암호화 마스터 키)
jasypt.encryptor.password=${AES_SECRET_KEY:dev-secret-key-change-in-prod}

# Async (Selenium 비동기 실행)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=10

# Logging
logging.level.com.shincha.naverblog=DEBUG
logging.level.org.mybatis=DEBUG
